<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Glow cyan -->
    <filter id="glowCyan" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Glow magenta -->
    <filter id="glowMagenta" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Glow yellow -->
    <filter id="glowYellow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Gradiente tampa -->
    <linearGradient id="lidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1828"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </linearGradient>
    <!-- Gradiente caixa -->
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081018"/>
      <stop offset="100%" stop-color="#050a14"/>
    </linearGradient>
    <!-- Gradiente fita vertical -->
    <linearGradient id="ribbonV" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00cc" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#ff00cc"/>
      <stop offset="100%" stop-color="#ff00cc" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Gradiente fita horizontal -->
    <linearGradient id="ribbonH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff00cc" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#ff00cc"/>
      <stop offset="100%" stop-color="#ff00cc" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Pulse animation -->
    <animate id="pulse" attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </defs>

  <!-- ── Sombra/reflexo base ── -->
  <ellipse cx="100" cy="185" rx="52" ry="8" fill="#ff00cc" opacity="0.12" filter="url(#glowMagenta)"/>

  <!-- ══════════════════════════════
       CAIXA PRINCIPAL
  ══════════════════════════════ -->

  <!-- Corpo da caixa -->
  <rect x="36" y="105" width="128" height="75" rx="4" ry="4"
        fill="url(#boxGrad)" stroke="#00f5ff" stroke-width="1.5"
        filter="url(#glowCyan)"/>

  <!-- Detalhe de circuito — lado esquerdo -->
  <polyline points="40,130 50,130 50,145 62,145" fill="none" stroke="#00f5ff" stroke-width="0.8" opacity="0.45"/>
  <circle cx="50" cy="130" r="2" fill="#00f5ff" opacity="0.6"/>
  <circle cx="62" cy="145" r="1.5" fill="#00f5ff" opacity="0.5"/>

  <!-- Detalhe de circuito — lado direito -->
  <polyline points="160,140 150,140 150,155 138,155" fill="none" stroke="#00f5ff" stroke-width="0.8" opacity="0.45"/>
  <circle cx="150" cy="140" r="2" fill="#00f5ff" opacity="0.6"/>
  <circle cx="138" cy="155" r="1.5" fill="#00f5ff" opacity="0.5"/>

  <!-- Fita vertical na caixa -->
  <rect x="92" y="105" width="16" height="75" fill="url(#ribbonV)" opacity="0.9"/>
  <!-- Borda brilhante da fita vertical -->
  <line x1="100" y1="106" x2="100" y2="179" stroke="#ff00cc" stroke-width="1" opacity="0.9" filter="url(#glowMagenta)"/>

  <!-- Bordas de canto chanfrado -->
  <line x1="36" y1="105" x2="42" y2="105" stroke="#f5e642" stroke-width="1.5" filter="url(#glowYellow)"/>
  <line x1="36" y1="105" x2="36" y2="111" stroke="#f5e642" stroke-width="1.5" filter="url(#glowYellow)"/>
  <line x1="164" y1="105" x2="158" y2="105" stroke="#f5e642" stroke-width="1.5" filter="url(#glowYellow)"/>
  <line x1="164" y1="105" x2="164" y2="111" stroke="#f5e642" stroke-width="1.5" filter="url(#glowYellow)"/>
  <line x1="36" y1="180" x2="42" y2="180" stroke="#f5e642" stroke-width="1.5" filter="url(#glowYellow)"/>
  <line x1="36" y1="180" x2="36" y2="174" stroke="#f5e642" stroke-width="1.5" filter="url(#glowYellow)"/>
  <line x1="164" y1="180" x2="158" y2="180" stroke="#f5e642" stroke-width="1.5" filter="url(#glowYellow)"/>
  <line x1="164" y1="180" x2="164" y2="174" stroke="#f5e642" stroke-width="1.5" filter="url(#glowYellow)"/>

  <!-- ══════════════════════════════
       TAMPA DA CAIXA
  ══════════════════════════════ -->

  <!-- Tampa -->
  <rect x="28" y="88" width="144" height="22" rx="3" ry="3"
        fill="url(#lidGrad)" stroke="#00f5ff" stroke-width="1.5"
        filter="url(#glowCyan)"/>

  <!-- Fita horizontal na tampa -->
  <rect x="28" y="95" width="144" height="8" fill="url(#ribbonH)" opacity="0.9"/>
  <line x1="29" y1="99" x2="171" y2="99" stroke="#ff00cc" stroke-width="1" opacity="0.9" filter="url(#glowMagenta)"/>

  <!-- Cantos chanfrados da tampa -->
  <line x1="28" y1="88" x2="35" y2="88" stroke="#f5e642" stroke-width="1.5" filter="url(#glowYellow)"/>
  <line x1="28" y1="88" x2="28" y2="95" stroke="#f5e642" stroke-width="1.5" filter="url(#glowYellow)"/>
  <line x1="172" y1="88" x2="165" y2="88" stroke="#f5e642" stroke-width="1.5" filter="url(#glowYellow)"/>
  <line x1="172" y1="88" x2="172" y2="95" stroke="#f5e642" stroke-width="1.5" filter="url(#glowYellow)"/>

  <!-- ══════════════════════════════
       LAÇO CYBERPUNK
  ══════════════════════════════ -->

  <!-- Laço esquerdo -->
  <path d="M100,88 C90,78 72,70 68,76 C64,82 80,88 100,88"
        fill="#ff00cc" fill-opacity="0.18" stroke="#ff00cc" stroke-width="1.8"
        filter="url(#glowMagenta)"/>
  <!-- Destaque laço esquerdo -->
  <path d="M100,88 C92,81 76,74 71,78"
        fill="none" stroke="#ff00cc" stroke-width="0.8" opacity="0.6"/>

  <!-- Laço direito -->
  <path d="M100,88 C110,78 128,70 132,76 C136,82 120,88 100,88"
        fill="#ff00cc" fill-opacity="0.18" stroke="#ff00cc" stroke-width="1.8"
        filter="url(#glowMagenta)"/>
  <!-- Destaque laço direito -->
  <path d="M100,88 C108,81 124,74 129,78"
        fill="none" stroke="#ff00cc" stroke-width="0.8" opacity="0.6"/>

  <!-- Nó central do laço -->
  <ellipse cx="100" cy="88" rx="7" ry="6"
           fill="#0d1828" stroke="#ff00cc" stroke-width="1.8"
           filter="url(#glowMagenta)"/>
  <ellipse cx="100" cy="88" rx="3" ry="2.5" fill="#ff00cc" opacity="0.8"/>

  <!-- ══════════════════════════════
       ELEMENTO DECORATIVO — SÍMBOLO ⚡
  ══════════════════════════════ -->
  <text x="100" y="152" text-anchor="middle" font-size="28"
        font-family="monospace" fill="#00f5ff" opacity="0.9"
        filter="url(#glowCyan)">⚡</text>

  <!-- ══════════════════════════════
       PARTÍCULAS / SPARKLES
  ══════════════════════════════ -->

  <!-- Sparkle top-left -->
  <g filter="url(#glowCyan)">
    <line x1="22" y1="72" x2="22" y2="64" stroke="#00f5ff" stroke-width="1.5" opacity="0.8"/>
    <line x1="18" y1="68" x2="26" y2="68" stroke="#00f5ff" stroke-width="1.5" opacity="0.8"/>
    <line x1="19.5" y1="65.5" x2="24.5" y2="70.5" stroke="#00f5ff" stroke-width="1" opacity="0.5"/>
    <line x1="24.5" y1="65.5" x2="19.5" y2="70.5" stroke="#00f5ff" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Sparkle top-right -->
  <g filter="url(#glowMagenta)">
    <line x1="178" y1="60" x2="178" y2="52" stroke="#ff00cc" stroke-width="1.5" opacity="0.8"/>
    <line x1="174" y1="56" x2="182" y2="56" stroke="#ff00cc" stroke-width="1.5" opacity="0.8"/>
    <line x1="175.5" y1="53.5" x2="180.5" y2="58.5" stroke="#ff00cc" stroke-width="1" opacity="0.5"/>
    <line x1="180.5" y1="53.5" x2="175.5" y2="58.5" stroke="#ff00cc" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Sparkle small -->
  <circle cx="155" cy="78" r="2.5" fill="#f5e642" opacity="0.85" filter="url(#glowYellow)"/>
  <circle cx="42" cy="96" r="1.8" fill="#00f5ff" opacity="0.7" filter="url(#glowCyan)"/>
  <circle cx="170" cy="130" r="1.5" fill="#ff00cc" opacity="0.6" filter="url(#glowMagenta)"/>
  <circle cx="30" cy="155" r="2" fill="#f5e642" opacity="0.5" filter="url(#glowYellow)"/>

  <!-- ══════════════════════════════
       LINHAS DE SCAN (CRT effect)
  ══════════════════════════════ -->
  <rect x="36" y="105" width="128" height="1" fill="#00f5ff" opacity="0.08"/>
  <rect x="36" y="120" width="128" height="1" fill="#00f5ff" opacity="0.06"/>
  <rect x="36" y="135" width="128" height="1" fill="#00f5ff" opacity="0.06"/>
  <rect x="36" y="150" width="128" height="1" fill="#00f5ff" opacity="0.06"/>
  <rect x="36" y="165" width="128" height="1" fill="#00f5ff" opacity="0.06"/>

  <!-- ══════════════════════════════
       TEXTO DECORATIVO
  ══════════════════════════════ -->
  <text x="100" y="24" text-anchor="middle" font-size="9"
        font-family="'Share Tech Mono', monospace" letter-spacing="3"
        fill="#00f5ff" opacity="0.7" filter="url(#glowCyan)">AMIGO.SECRETO</text>
  <text x="100" y="38" text-anchor="middle" font-size="7"
        font-family="'Share Tech Mono', monospace" letter-spacing="2"
        fill="#ff00cc" opacity="0.6">// CYBER.PROTOCOL //</text>

  <!-- Linha decorativa abaixo do texto -->
  <line x1="55" y1="44" x2="145" y2="44" stroke="#00f5ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="70" y1="47" x2="130" y2="47" stroke="#ff00cc" stroke-width="0.5" opacity="0.25"/>

</svg>
